# config.toml — single source of truth for GrainBids platform settings
# Edit this file to change paths, thresholds, or source settings.
# No code changes needed when moving output destinations.

[paths]
# Ordered list of candidate output directories — first writable one wins.
# Use forward slashes or escaped backslashes.
output_candidates = [
    "P:\\Adam\\Code\\TestingGrainBidder\\TestOutput",
    "\\\\DERKS-SERVER\\Current\\Adam\\Code\\TestingGrainBidder\\TestOutput",
    "TestOutput",
]

# SQLite database path (keep LOCAL — SQLite + network shares have locking issues)
db_path = "data/grain_bids.db"

# Posted bids output directory (CSV for Wix / external use)
posted_bids_dir = "\\\\DERKS-SERVER\\Current\\Adam\\Code\\CashGrainBids\\PostedBids"

[sources]
# Set to false to disable a source without removing it from the code
agricharts = true
glg        = true
lac        = true
andersons  = true
snobelen   = true
hensall    = true
dg_global  = true
bunge      = false  # URLs no longer valid — needs investigation before re-enabling
wanstead   = true
ganaraska  = true

[posted_bid]
# Discount band applied to trimmed market average (CAD/MT)
target_discount_cad_mt  = 7.5
discount_min_cad_mt     = 5.0
discount_max_cad_mt     = 10.0

# Trimmed mean: drop top/bottom N% of competitor prices before averaging
trim_percent = 0.20

# Optional absolute floor/ceiling (set to 0.0 to disable)
min_posted_bid_cad_mt = 0.0
max_posted_bid_cad_mt = 0.0

# Max allowed daily move (rate limiting)
max_move_up_cad_mt   = 3.0
max_move_down_cad_mt = 5.0

# Locations excluded from the competitor universe (exact match, case-insensitive)
exclude_corn     = ["Cardinal Corn", "Johnstown Corn", "Prescott Corn"]
exclude_soybeans = ["Prescott Soybeans"]

# ─── US Elevator Sources ──────────────────────────────────────────────────────
# type = "agricharts"  → writeBidRow() pattern, no browser needed
# type = "dtn"         → DTN CashBidTable widget, requires Playwright
#
# To add a new elevator: copy a block below, set enabled=true, fill name/url/type.
# No code changes needed — GrainBidder picks these up automatically.

[us]
